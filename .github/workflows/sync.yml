name: Sync Fork

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: |
          git remote add upstream https://github.com/breadeding/OmenSuperHub.git
          git fetch upstream

      - run: |
          git checkout main
          git merge upstream/main --no-edit

      - run: |
          git push origin main
