name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - uses: NuGet/setup-nuget@v2

      - name: Generate Version
        id: version
        shell: powershell
        run: |
          $version = Get-Date -Format "yyyy.M.d"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: nuget restore OmenSuperHub.sln

      - name: Build
        run: msbuild OmenSuperHub.sln /p:Configuration=Release /p:Platform=x64

      - name: Find EXE
        id: findexe
        shell: powershell
        run: |
          $exe = Get-ChildItem -Recurse -Filter OmenSuperHub.exe |
                 Where-Object {$_.FullName -match "Release"} |
                 Select-Object -First 1

          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      # 完整目录 Artifact
      - name: Upload Build Folder
        uses: actions/upload-artifact@v4
        with:
          name: OmenSuperHub-Build
          path: bin/x64/Release

      # 单独 EXE Artifact
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: OmenSuperHub-EXE
          path: ${{ steps.findexe.outputs.path }}

      # Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: OmenSuperHub ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.findexe.outputs.path }}
