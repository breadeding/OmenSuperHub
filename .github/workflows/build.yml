name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Generate Version
        id: version
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $date = Get-Date -Format "yyyy.M.d"

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
          }

          $releases = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" `
            -Headers $headers

          $tags = @($releases.tag_name)

          $sameDayTags = $tags | Where-Object {
            $_ -match "^v$([regex]::Escape($date))(\.\d+)?$"
          }

          if ($sameDayTags.Count -eq 0) {
            $version = $date
          }
          else {
            $maxSuffix = 0

            foreach ($tag in $sameDayTags) {
              if ($tag -eq "v$date") {
                if ($maxSuffix -lt 1) {
                  $maxSuffix = 1
                }
              }
              elseif ($tag -match "^v$([regex]::Escape($date))\.(\d+)$") {
                $n = [int]$matches[1] + 1
                if ($n -gt $maxSuffix) {
                  $maxSuffix = $n
                }
              }
            }

            $version = "$date.$maxSuffix"
          }

          Write-Host "Version: v$version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore NuGet Packages
        run: nuget restore OmenSuperHub.sln

      - name: Build Release x64
        run: >
          msbuild OmenSuperHub.sln
          /m
          /p:Configuration=Release
          /p:Platform=x64

      - name: Find EXE
        id: findexe
        shell: powershell
        run: |
          $exe = Get-ChildItem -Recurse -Filter OmenSuperHub.exe |
                 Where-Object { $_.FullName -match "Release" } |
                 Select-Object -First 1

          if (-not $exe) {
            throw "OmenSuperHub.exe not found"
          }

          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload Build Directory
        uses: actions/upload-artifact@v4
        with:
          name: OmenSuperHub-Build
          path: bin/x64/Release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: OmenSuperHub-EXE
          path: ${{ steps.findexe.outputs.path }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OmenSuperHub v${{ steps.version.outputs.version }}
          body: ""
          generate_release_notes: false
          draft: false
          prerelease: false
          files: ${{ steps.findexe.outputs.path }}
